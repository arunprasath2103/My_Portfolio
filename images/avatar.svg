<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#0C2545"/>
      <stop offset="100%" stop-color="#050A14"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06FFCC" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#06FFCC" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="circle"><circle cx="100" cy="100" r="100"/></clipPath>
  </defs>
  <g clip-path="url(#circle)">
    <rect width="200" height="200" fill="url(#bg)"/>
    <circle cx="100" cy="100" r="100" fill="url(#glow)"/>
    <!-- Grid lines -->
    <line x1="0" y1="40" x2="200" y2="40" stroke="#06FFCC" stroke-width="0.3" opacity="0.15"/>
    <line x1="0" y1="80" x2="200" y2="80" stroke="#06FFCC" stroke-width="0.3" opacity="0.15"/>
    <line x1="0" y1="120" x2="200" y2="120" stroke="#06FFCC" stroke-width="0.3" opacity="0.15"/>
    <line x1="0" y1="160" x2="200" y2="160" stroke="#06FFCC" stroke-width="0.3" opacity="0.15"/>
    <line x1="40" y1="0" x2="40" y2="200" stroke="#06FFCC" stroke-width="0.3" opacity="0.15"/>
    <line x1="80" y1="0" x2="80" y2="200" stroke="#06FFCC" stroke-width="0.3" opacity="0.15"/>
    <line x1="120" y1="0" x2="120" y2="200" stroke="#06FFCC" stroke-width="0.3" opacity="0.15"/>
    <line x1="160" y1="0" x2="160" y2="200" stroke="#06FFCC" stroke-width="0.3" opacity="0.15"/>
    <!-- Shoulder/body silhouette -->
    <ellipse cx="100" cy="240" rx="80" ry="60" fill="#0C1526"/>
    <!-- Head shape -->
    <ellipse cx="100" cy="88" rx="44" ry="50" fill="#0C2545"/>
    <!-- Face -->
    <ellipse cx="100" cy="90" rx="40" ry="46" fill="#1a3a5c"/>
    <!-- Initials -->
    <text x="100" y="105" text-anchor="middle" font-family="'Syne', sans-serif" font-size="38" font-weight="800" fill="#06FFCC" letter-spacing="-1">AP</text>
  </g>
  <!-- Border ring -->
  <circle cx="100" cy="100" r="98" fill="none" stroke="#06FFCC" stroke-width="1" opacity="0.4"/>
  <circle cx="100" cy="100" r="94" fill="none" stroke="#06FFCC" stroke-width="0.5" opacity="0.15"/>
</svg>
